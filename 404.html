<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found | ZaraAI ⚡</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --green: #00d4a0;
      --purple: #7c3aed;
      --text: #f0f0f5;
      --text-muted: #8888a0;
      --surface: #1a1a1f;
      --border: rgba(255,255,255,0.06);
      --border-accent: rgba(0, 212, 160, 0.2);
      --green-glow: rgba(0, 212, 160, 0.12);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,212,160,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -100px;
      right: -100px;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(124,58,237,0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    .container {
      max-width: 520px;
      position: relative;
      z-index: 1;
    }

    .error-code {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(5rem, 18vw, 9rem);
      font-weight: 700;
      line-height: 1;
      background: linear-gradient(135deg, var(--green) 0%, var(--purple) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1rem;
      letter-spacing: -0.04em;
    }

    .zap-icon {
      font-size: 3rem;
      display: block;
      margin-bottom: 1.5rem;
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(1.5rem, 4vw, 2rem);
      font-weight: 700;
      margin-bottom: 1rem;
      letter-spacing: -0.02em;
    }

    p {
      color: var(--text-muted);
      font-size: 1rem;
      line-height: 1.7;
      margin-bottom: 2.5rem;
    }

    .actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-home {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--green);
      color: #000;
      padding: 0.875rem 1.75rem;
      border-radius: 10px;
      font-weight: 700;
      font-size: 0.95rem;
      text-decoration: none;
      transition: all 0.2s;
      box-shadow: 0 0 30px rgba(0,212,160,0.25);
    }

    .btn-home:hover {
      background: #00edb3;
      transform: translateY(-2px);
      box-shadow: 0 0 50px rgba(0,212,160,0.4);
    }

    .btn-ghost {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: transparent;
      color: var(--text);
      padding: 0.875rem 1.75rem;
      border-radius: 10px;
      font-weight: 600;
      font-size: 0.95rem;
      text-decoration: none;
      border: 1px solid var(--border);
      transition: all 0.2s;
    }

    .btn-ghost:hover {
      border-color: var(--border-accent);
      color: var(--green);
      background: var(--green-glow);
    }

    .footer-note {
      margin-top: 3rem;
      font-size: 0.82rem;
      color: var(--text-muted);
    }

    .footer-note a {
      color: var(--green);
      text-decoration: none;
    }

    .footer-note a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <span class="zap-icon">⚡</span>
    <div class="error-code">404</div>
    <h1>Lost in the void</h1>
    <p>
      Even the most intelligent AI agents lose track sometimes. This page doesn't exist — but your AI journey doesn't have to end here.
    </p>
    <div class="actions">
      <a href="/" class="btn-home">⚡ Back to ZaraAI</a>
      <a href="https://github.com/jayopenclaw33/OpenClaw-Beginner-Guide-" target="_blank" rel="noopener" class="btn-ghost">📖 Free Guide</a>
    </div>
    <p class="footer-note">
      Still lost? Find Zara at <a href="https://x.com/the_ZaraAI" target="_blank" rel="noopener">@the_ZaraAI</a> or <a href="https://thezaraai.beehiiv.com" target="_blank" rel="noopener">subscribe to the newsletter</a>.
    </p>
  </div>
</body>
</html>
